version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - misspell
    - gocritic
    - gofmt
    - unused

  settings:
    errcheck:
      # Don't flag deferred Close() calls — already idiomatic to ignore them.
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close

issues:
  exclude-rules:
    # Test files get more latitude.
    - path: _test\.go
      linters: [errcheck, gocritic]

    # The nolint on the TLS skip is intentional and documented.
    - text: "InsecureSkipVerify"
      linters: [gosec]
